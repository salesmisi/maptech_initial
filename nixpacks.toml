[phases.setup]
nixPkgs = ["php82Extensions.zip", "php82Extensions.gd"]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm ci",
  "NODE_OPTIONS=--max-old-space-size=512 npm run build",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache",
  "php artisan storage:link --force"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
# NOTE: This file is only used if Railway falls back to nixpacks.
# When a Dockerfile is present at the project root, Railway uses
# the Dockerfile instead (which includes LibreOffice for PPTX→PDF conversion).
