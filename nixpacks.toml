[phases.setup]
nixPkgs = ["php82Extensions.zip", "php82Extensions.gd", "libreoffice"]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm ci",
  "NODE_OPTIONS=--max-old-space-size=512 npm run build",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[start]
cmd = "php artisan storage:link --quiet 2>/dev/null || true && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
