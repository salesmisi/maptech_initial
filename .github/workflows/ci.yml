name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services: {}
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, zip

      - name: Validate composer
        run: composer --version

      - name: Install composer dependencies
        run: composer install --no-progress --no-suggest --prefer-dist

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse app --no-progress || true

      - name: Run Psalm
        run: vendor/bin/psalm --no-cache || true

      - name: Run PHPUnit
        run: vendor/bin/phpunit --colors=always

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Node deps
        run: npm ci

      - name: Run ESLint
        run: npx eslint "resources/js/src/**/*.{ts,tsx}" --max-warnings=0 || true

      - name: Build frontend
        run: npm run build --if-present
